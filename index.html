<!DOCTYPE html>

<style>
body {

    background: #f8f8fb;

}

    margin-top: 40px;
    color: #e84393;
}

.container {
    margin-top: 50px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;

.card {

.card:hover {
    transform: translateY(-5px);
    background: #ffeef8;
}

.card h3 {

.footer {
    margin-top: 60px;

    <div class="card" onclick="openPage('overview.html')">
        <h3>Overview</h3>
        <p>Project Explanation Page</p>
    </div>

    <div class="card" onclick="openPage('test01.html')">

<div class="footer">
